{% extends "base.html" %}

{% block title %}Оқушы кіру{% endblock %}

{% block extra_css %}
<style>
    .page-content {
        margin: 0 !important;
        padding: 0 !important;
        max-width: 100% !important;
        width: 100% !important;
    }
    
    .auth-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        z-index: 1;
    }
    .auth-card {
        background: white;
        padding: 1.5rem 2rem;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 400px;
        max-height: 90vh;
        overflow-y: auto;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 1rem;
    }
    .auth-icon {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 0.5rem;
        font-size: 1.3rem;
        color: white;
    }
    .auth-title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #0f172a;
        margin: 0;
    }
    .auth-subtitle {
        color: #64748b;
        margin-top: 0.3rem;
        font-size: 0.9rem;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-label {
        display: block;
        margin-bottom: 0.3rem;
        font-weight: 600;
        color: #0f172a;
        font-size: 0.9rem;
    }
    .form-icon {
        position: relative;
    }
    .form-icon i {
        position: absolute;
        left: 0.8rem;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 0.9rem;
    }
    .form-input {
        width: 100%;
        padding: 0.7rem 0.7rem 0.7rem 2.2rem;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-family: 'Nunito', sans-serif;
        font-size: 0.95rem;
        transition: all 0.3s;
        box-sizing: border-box;
    }
    .form-input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .btn-login {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        padding: 0.8rem;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s;
    }
    .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 20px rgba(99,102,241,0.3);
    }
    .auth-footer {
        text-align: center;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #e2e8f0;
        font-size: 0.9rem;
    }
    .auth-footer a {
        color: #6366f1;
        text-decoration: none;
        font-weight: 600;
    }
    .hint-text {
        background: #eef2ff;
        border-left: 3px solid #6366f1;
        padding: 0.7rem;
        border-radius: 0 8px 8px 0;
        margin-bottom: 1rem;
        color: #3730a3;
        font-size: 0.8rem;
    }
    .hint-text i {
        margin-right: 0.3rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-content">
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h1 class="auth-title">Оқушы кіру</h1>
                <p class="auth-subtitle">Аккаунтыңызға кіріңіз</p>
            </div>

            <div class="hint-text">
                <i class="fas fa-info-circle"></i> 
                Тіркелген кездегі <strong>аты-жөніңіз</strong>, <strong>сынып коды</strong> және <strong>жеке пароль</strong> енгізіңіз.
            </div>

            <form class="auth-form" method="POST" action="/login_student">
                <div class="form-group">
                    <label class="form-label">Аты-жөні</label>
                    <div class="form-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" name="full_name" class="form-input" placeholder="Толық аты-жөні" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Сынып коды</label>
                    <div class="form-icon">
                        <i class="fas fa-key"></i>
                        <input type="text" name="class_code" class="form-input" placeholder="Мысалы: HM44XU" required
                               style="text-transform: uppercase;"
                               oninput="this.value = this.value.toUpperCase()">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Жеке пароль</label>
                    <div class="form-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-input" placeholder="Жеке пароль" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Кіру
                </button>
            </form>

            <div class="auth-footer">
                <p>Аккаунтыңыз жоқ па? <a href="/register_student">Тіркелу</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
