{% extends "base.html" %}

{% block title %}Оқушы тіркелу{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        margin: 0 auto;
    }

    .auth-card {
        background: white;
        padding: 3rem;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        font-size: 2rem;
        color: white;
    }

    .auth-title {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--dark);
    }

    .auth-subtitle {
        color: #64748b;
        margin-top: 0.5rem;
    }

    .auth-form {
        margin-top: 2rem;
    }

    .form-icon {
        position: relative;
    }

    .form-icon i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
    }

    .form-icon input {
        padding-left: 3rem;
    }

    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #f1f5f9;
    }

    .auth-footer a {
        color: #6366f1;
        text-decoration: none;
        font-weight: 700;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="auth-title">Оқушы тіркелу</h1>
            <p class="auth-subtitle">Жаңа аккаунт жасау</p>
        </div>

        <form class="auth-form" method="POST" action="/register_student">
            <div class="form-group">
                <label class="form-label">Аты-жөні</label>
                <div class="form-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" name="full_name" class="form-input" placeholder="Толық аты-жөні" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Сынып коды</label>
                <div class="form-icon">
                    <i class="fas fa-users"></i>
                    <input type="text" name="class_code" class="form-input" placeholder="Мұғалім берген сынып коды" required>
                </div>
            </div>


            <div class="form-group">
                <label class="form-label">Жеке пароль</label>
                <div class="form-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-input" placeholder="Жеке пароль ойлап табыңыз" required>
                </div>
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%; justify-content: center; padding: 1rem;">
                <i class="fas fa-user-plus"></i> Тіркелу
            </button>
        </form>

        <div class="auth-footer">
            <p>Аккаунтыңыз бар ма? <a href="/login_student">Кіру</a></p>
        </div>
    </div>
</div>
{% endblock %}
